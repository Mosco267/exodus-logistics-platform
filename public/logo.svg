<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exodus Logistics — Logo Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, sans-serif;
    background: #0f172a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 40px 20px;
  }

  h3 {
    color: #94a3b8;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 14px;
    text-align: center;
  }

  .preview-block {
    width: 100%;
    max-width: 580px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 44px 40px;
    margin-bottom: 18px;
  }

  .on-gradient {
    background: linear-gradient(135deg, #1d4ed8 0%, #0891b2 100%);
  }
  .on-white {
    background: #ffffff;
    border: 1px solid #e2e8f0;
  }
  .on-dark {
    background: #0f172a;
    border: 1px solid #1e293b;
  }

  .copy-section {
    margin-top: 32px;
    width: 100%;
    max-width: 580px;
  }

  .copy-label {
    color: #64748b;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  textarea {
    width: 100%;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 12px;
    color: #cbd5e1;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    line-height: 1.5;
    padding: 16px;
    resize: vertical;
    min-height: 200px;
  }

  button {
    margin-top: 10px;
    padding: 10px 22px;
    background: linear-gradient(135deg, #1d4ed8, #0891b2);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.03em;
  }
  button:hover { opacity: 0.9; }
</style>
</head>
<body>

  <h3>On Gradient Background (Header)</h3>
  <div class="preview-block on-gradient" id="preview-gradient">
    <!-- LOGO SVG INLINE -->
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" fill="none" width="320" height="72" role="img" aria-label="Exodus Logistics">
      <!-- ── ICON MARK ── -->
      <!-- Outer hexagon ring -->
      <polygon points="36,4 62,19 62,49 36,64 10,49 10,19" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
      <!-- Inner hexagon fill -->
      <polygon points="36,11 56,22.5 56,45.5 36,57 16,45.5 16,22.5" fill="rgba(255,255,255,0.08)"/>

      <!-- Globe meridian arcs — white -->
      <ellipse cx="36" cy="34" rx="18" ry="18" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.6"/>
      <ellipse cx="36" cy="34" rx="9" ry="18" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/>
      <line x1="18" y1="34" x2="54" y2="34" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/>
      <line x1="20" y1="25" x2="52" y2="25" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <line x1="20" y1="43" x2="52" y2="43" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>

      <!-- Arrow / forward motion — orange accent -->
      <path d="M28 34 L38 26 L38 31 L46 31 L46 37 L38 37 L38 42 Z"
            fill="#f97316" opacity="0.95"/>
      <!-- Arrow highlight -->
      <path d="M28 34 L38 26 L38 31 L46 31 L46 33 L38 33 L38 26 Z"
            fill="#fdba74" opacity="0.5"/>

      <!-- ── WORDMARK ── -->
      <!-- EXODUS -->
      <text x="80" y="36"
        font-family="'Georgia', 'Times New Roman', serif"
        font-size="26"
        font-weight="700"
        letter-spacing="3"
        fill="#ffffff">EXODUS</text>

      <!-- Orange dot accent after EXODUS -->
      <circle cx="228" cy="30" r="3.5" fill="#f97316"/>

      <!-- LOGISTICS -->
      <text x="80" y="56"
        font-family="'Georgia', 'Times New Roman', serif"
        font-size="12"
        font-weight="400"
        letter-spacing="8"
        fill="rgba(255,255,255,0.75)">LOGISTICS</text>

      <!-- Thin orange underline under LOGISTICS -->
      <line x1="80" y1="61" x2="240" y2="61" stroke="#f97316" stroke-width="1.5" opacity="0.7"/>
    </svg>
  </div>

  <h3>On White Background</h3>
  <div class="preview-block on-white" id="preview-white">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" fill="none" width="320" height="72" role="img" aria-label="Exodus Logistics">
      <polygon points="36,4 62,19 62,49 36,64 10,49 10,19" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
      <polygon points="36,11 56,22.5 56,45.5 36,57 16,45.5 16,22.5" fill="#f0f9ff"/>
      <ellipse cx="36" cy="34" rx="18" ry="18" fill="none" stroke="#1d4ed8" stroke-width="1.6"/>
      <ellipse cx="36" cy="34" rx="9" ry="18" fill="none" stroke="#3b82f6" stroke-width="1.2"/>
      <line x1="18" y1="34" x2="54" y2="34" stroke="#3b82f6" stroke-width="1.2"/>
      <line x1="20" y1="25" x2="52" y2="25" stroke="#93c5fd" stroke-width="1"/>
      <line x1="20" y1="43" x2="52" y2="43" stroke="#93c5fd" stroke-width="1"/>
      <path d="M28 34 L38 26 L38 31 L46 31 L46 37 L38 37 L38 42 Z" fill="#f97316"/>
      <path d="M28 34 L38 26 L38 31 L46 31 L46 33 L38 33 L38 26 Z" fill="#fdba74" opacity="0.5"/>
      <text x="80" y="36" font-family="'Georgia', 'Times New Roman', serif" font-size="26" font-weight="700" letter-spacing="3" fill="#1d4ed8">EXODUS</text>
      <circle cx="228" cy="30" r="3.5" fill="#f97316"/>
      <text x="80" y="56" font-family="'Georgia', 'Times New Roman', serif" font-size="12" font-weight="400" letter-spacing="8" fill="#64748b">LOGISTICS</text>
      <line x1="80" y1="61" x2="240" y2="61" stroke="#f97316" stroke-width="1.5" opacity="0.8"/>
    </svg>
  </div>

  <h3>On Dark Background</h3>
  <div class="preview-block on-dark" id="preview-dark">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" fill="none" width="320" height="72" role="img" aria-label="Exodus Logistics">
      <polygon points="36,4 62,19 62,49 36,64 10,49 10,19" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
      <polygon points="36,11 56,22.5 56,45.5 36,57 16,45.5 16,22.5" fill="rgba(255,255,255,0.04)"/>
      <ellipse cx="36" cy="34" rx="18" ry="18" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.6"/>
      <ellipse cx="36" cy="34" rx="9" ry="18" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>
      <line x1="18" y1="34" x2="54" y2="34" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>
      <line x1="20" y1="25" x2="52" y2="25" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
      <line x1="20" y1="43" x2="52" y2="43" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
      <path d="M28 34 L38 26 L38 31 L46 31 L46 37 L38 37 L38 42 Z" fill="#f97316"/>
      <path d="M28 34 L38 26 L38 31 L46 31 L46 33 L38 33 L38 26 Z" fill="#fdba74" opacity="0.5"/>
      <text x="80" y="36" font-family="'Georgia', 'Times New Roman', serif" font-size="26" font-weight="700" letter-spacing="3" fill="#f8fafc">EXODUS</text>
      <circle cx="228" cy="30" r="3.5" fill="#f97316"/>
      <text x="80" y="56" font-family="'Georgia', 'Times New Roman', serif" font-size="12" font-weight="400" letter-spacing="8" fill="rgba(255,255,255,0.5)">LOGISTICS</text>
      <line x1="80" y1="61" x2="240" y2="61" stroke="#f97316" stroke-width="1.5" opacity="0.7"/>
    </svg>
  </div>

  <!-- SVG Code to copy -->
  <div class="copy-section">
    <p class="copy-label">SVG Code — save as logo.svg (for gradient/dark backgrounds)</p>
    <textarea id="svg-code" readonly><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" fill="none" role="img" aria-label="Exodus Logistics">
  <!-- Hexagon ring -->
  <polygon points="36,4 62,19 62,49 36,64 10,49 10,19" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <polygon points="36,11 56,22.5 56,45.5 36,57 16,45.5 16,22.5" fill="rgba(255,255,255,0.08)"/>
  <!-- Globe -->
  <ellipse cx="36" cy="34" rx="18" ry="18" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.6"/>
  <ellipse cx="36" cy="34" rx="9" ry="18" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/>
  <line x1="18" y1="34" x2="54" y2="34" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/>
  <line x1="20" y1="25" x2="52" y2="25" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <line x1="20" y1="43" x2="52" y2="43" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <!-- Arrow accent (orange) -->
  <path d="M28 34 L38 26 L38 31 L46 31 L46 37 L38 37 L38 42 Z" fill="#f97316" opacity="0.95"/>
  <path d="M28 34 L38 26 L38 31 L46 31 L46 33 L38 33 L38 26 Z" fill="#fdba74" opacity="0.5"/>
  <!-- Wordmark -->
  <text x="80" y="36" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700" letter-spacing="3" fill="#ffffff">EXODUS</text>
  <circle cx="228" cy="30" r="3.5" fill="#f97316"/>
  <text x="80" y="56" font-family="Georgia, 'Times New Roman', serif" font-size="12" font-weight="400" letter-spacing="8" fill="rgba(255,255,255,0.75)">LOGISTICS</text>
  <line x1="80" y1="61" x2="240" y2="61" stroke="#f97316" stroke-width="1.5" opacity="0.7"/>
</svg></textarea>
    <button onclick="navigator.clipboard.writeText(document.getElementById('svg-code').value).then(()=>this.textContent='✓ Copied!').catch(()=>this.textContent='Select & copy manually')">Copy SVG Code</button>
  </div>

</body>
</html>