<svg width="260" height="68" viewBox="0 0 260 68" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="globeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fb923c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dbeafe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cffafe;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Hexagon background -->
  <polygon points="34,2 60,17 60,47 34,62 8,47 8,17"
    fill="url(#hexGrad)" stroke="#bfdbfe" stroke-width="1.5"/>

  <!-- Globe circle -->
  <circle cx="34" cy="32" r="20" fill="none" stroke="url(#globeGrad)" stroke-width="2"/>

  <!-- Globe meridian lines -->
  <ellipse cx="34" cy="32" rx="20" ry="9" fill="none" stroke="url(#globeGrad)" stroke-width="1.2" opacity="0.55"/>
  <ellipse cx="34" cy="32" rx="9" ry="20" fill="none" stroke="url(#globeGrad)" stroke-width="1.2" opacity="0.55"/>
  <line x1="14" y1="32" x2="54" y2="32" stroke="url(#globeGrad)" stroke-width="1.2" opacity="0.55"/>

  <!-- Orange arrow cutting through globe -->
  <path d="M24 32 L33 23 L33 28 L43 28 L43 36 L33 36 L33 41 Z"
    fill="url(#arrowGrad)"/>
  <!-- Arrow highlight -->
  <path d="M24 32 L33 23 L33 28 L43 28 L43 30 L33 30 L33 23 Z"
    fill="#fed7aa" opacity="0.45"/>

  <!-- EXODUS wordmark -->
  <text x="74" y="36"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="26"
    font-weight="700"
    letter-spacing="2.5"
    fill="#1e293b">EXODUS</text>

  <!-- Orange dot accent -->
  <circle cx="222" cy="29" r="3.5" fill="#f97316"/>

  <!-- LOGISTICS subtext -->
  <text x="74" y="54"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="11.5"
    font-weight="400"
    letter-spacing="7"
    fill="#475569">LOGISTICS</text>

  <!-- Orange underline -->
  <line x1="74" y1="59" x2="236" y2="59" stroke="#f97316" stroke-width="1.8" opacity="0.75"/>
</svg>